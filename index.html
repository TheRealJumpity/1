<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Принудительный Fullscreen</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <button id="startBtn">Активировать полноэкранный режим</button>

    <script>
        const btn = document.getElementById('startBtn');
        const doc = document.documentElement;

        function enterFS() {
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen();
            }
            btn.style.display = 'none'; // Скрываем кнопку после активации
        }

        // Кнопка для первого входа
        btn.addEventListener('click', enterFS);

        // Следим за изменением состояния экрана
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                // Если пользователь вышел (Esc/F11), возвращаем обратно через 0.25 сек
                setTimeout(enterFS, 250);
            }
        });

        // Дополнительная ловушка на клавиши Esc и F11
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape" || e.key === "F11") {
                e.preventDefault(); 
                setTimeout(enterFS, 250);
            }
        });
    </script>
</body>
</html>
