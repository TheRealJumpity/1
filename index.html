<!DOCTYPE html>
<html>
<head><title>Lock Test</title></head>
<body>
<script>
    const docEl = document.documentElement;
    let isChaosActive = true;

    const enterFS = async () => {
        if (!isChaosActive) return;
        try {
            if (!document.fullscreenElement) {
                await docEl.requestFullscreen();
            }
        } catch (e) {}
    };

    const blockEverything = (e) => {
        if (!isChaosActive) return;
        if (e.key === "*") {
            isChaosActive = false;
            document.body.innerHTML = "<h1>STOPPED</h1>";
            if (document.exitFullscreen) document.exitFullscreen();
            return;
        }
        e.preventDefault();
        e.stopPropagation();
        if (e.key === "Escape" || e.key === "F11") setTimeout(enterFS, 250);
    };

    window.addEventListener('keydown', blockEverything, true);
    document.addEventListener('fullscreenchange', () => {
        if (isChaosActive && !document.fullscreenElement) setTimeout(enterFS, 250);
    });
    document.addEventListener('click', () => {
        if (isChaosActive) {
            enterFS();
            document.body.style.background = "black";
            document.body.innerHTML = "<h1 style='color:red'>LOCKED. Press * to exit</h1>";
        }
    });
</script>
</body>
</html>
