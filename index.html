<!DOCTYPE html>
<html>
<head>
    <title>Tab Generator</title>
    <style>
        body { 
            background: #111; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; 
        }
    </style>
</head>
<body>
    <h1>Зажми ПРОБЕЛ (разреши всплывающие окна в браузере)</h1>
    <h1>Hold SPACE (allow popups in the browser)</h1>
<script>
    let interval = null;

    // Функция открытия нового уникального окна
    function openNewTab() {
        const randomId = Math.random().toString(36).substring(7);
        // Добавляем случайный параметр, чтобы URL всегда был уникальным
        const url = window.location.origin + window.location.pathname + "?id=" + randomId;
        window.open(url, "_blank");
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === "Space" && !interval) {
            e.preventDefault();
            // Открываем новую вкладку каждые 100мс (10 штук в секунду)
            interval = setInterval(openNewTab, 100);
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === "Space") {
            clearInterval(interval);
            interval = null;
        }
    });
</script>
</body>
</html>
